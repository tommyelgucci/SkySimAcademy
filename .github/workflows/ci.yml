name: CI

# Red de seguridad: valida cada push a main y cada PR antes de que
# deploy-pages.yml publique en producción.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validar i18n y contenido
        run: npm run check:i18n
      - name: Tests unitarios (FlightEngine, MissionTracker, FlightEvaluator)
        run: npm test
      - name: Build
        run: npm run build
